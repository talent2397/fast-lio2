/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 1
        max_iteration: 4
        filter_size_surf: 0.3
        filter_size_map: 0.3
        cube_side_length: 1000.0
        runtime_pos_log_enable: true
        map_file_path: "./fastlio_map.pcd"

        common:
            lid_topic: "/robot/lidar"
            imu_topic: "/robot/imu"
            time_sync_en: false             # Gazebo sim-time is already synced
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 5              # 5=default_handler (generic PointXYZI)
            scan_line: 16
            blind: 3.0
            timestamp_unit: 0              # 0=seconds (Gazebo sim time)
            scan_rate: 10

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree: 360.0
            det_range: 50.0
            extrinsic_est_en: true
            extrinsic_T: [0.0, 0.0, 0.0]
            extrinsic_R: [1., 0., 0.,
                          0., 1., 0.,
                          0., 0., 1.]

        publish:
            path_en: true
            effect_map_en: false
            map_en: true
            scan_publish_en: true
            dense_publish_en: false
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: true
            interval: -1
