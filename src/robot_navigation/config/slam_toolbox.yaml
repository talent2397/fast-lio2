# slam_toolbox — online_async 模式
# 输入: /scan (from pointcloud_to_laserscan) + /robot/odom (FAST-LIO/Gazebo odometry)
# 输出: /map (2D 占据栅格地图)

slam_toolbox:
  ros__parameters:
    # 运行模式: online_async — 异步在线建图 (实时处理每一帧)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_diagonal_type: CLUSTERED
    ceres_loss_function: None

    # 坐标帧
    odom_frame: robot/odom
    map_frame: map
    base_frame: robot/base_link
    scan_topic: /scan
    # 使用 /robot/odom 里程计 (仿真中用轮式里程计, 真机改用 FAST-LIO /Odometry)
    odom_topic: /robot/odom

    # 地图参数
    map_file_name: /tmp/slam_map
    map_start_pose: [0.0, 0.0, 0.0]
    map_update_interval: 1.0   # 每秒更新地图
    resolution: 0.05           # 5cm/grid
    max_laser_range: 30.0
    minimum_time_interval: 0.3
    transform_timeout: 0.3
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000  # 40MB

    # 回环检测
    loop_search_maximum_distance: 3.0
    loop_search_minimum_score: 0.2
    loop_closure_pose_buffer: 10
    loop_closure_enable_submap_constraint: false

    # 扫描匹配
    max_pose_correction_linear: 0.5
    max_pose_correction_angular: 0.5
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.1

    # 协方差
    odom_model_type: diff
    enable_interactive_mode: false
